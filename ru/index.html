<script>
/* ── SCROLL REVEAL + COUNTERS ── */
(function(){
  var EASE = 'cubic-bezier(.25,.46,.45,.94)';

  /* Selectors to scroll-reveal (avoid hero — it uses CSS animation) */
  var SOLO = [
    '.sh','.pg-h2','.pillar-h2',
    '.slbl','.slbl-pg','.pillar-section-label',
    '.sp','.pg-lead','.pillar-lead',
    '.mock-banner','.cta-banner','.form-card','.form-info',
    '.marq','.div'
  ];

  /* Grid containers whose children get staggered */
  var GRIDS = [
    '.wgrid','.pgrid','.steps-grid',
    '.results-grid','.scores-grid','.mgrid',
    '.uni-grid','.partners-grid','.services-grid',
    '.pricing-grid','.faq-wrap','.faq-list',
    '.blog-grid','.wgrid','.inner-links-grid'
  ];

  var tagged = new WeakSet();

  function tag(el, delay){
    if(!el || tagged.has(el)) return;
    /* Skip if inside a .hero or .pillar-hero */
    if(el.closest('.hero,.pillar-hero,.pg-hero')) return;
    tagged.add(el);
    el.setAttribute('data-anim','1');
    if(delay) el.setAttribute('data-anim-d', String(delay));
  }

  SOLO.forEach(function(sel){
    document.querySelectorAll(sel).forEach(function(el){ tag(el); });
  });

  GRIDS.forEach(function(sel){
    document.querySelectorAll(sel).forEach(function(grid){
      var kids = grid.children;
      for(var i=0;i<kids.length;i++) tag(kids[i], Math.min(i+1,8));
    });
  });

  /* Fallback if no IntersectionObserver */
  var all = document.querySelectorAll('[data-anim]');
  if(!window.IntersectionObserver){
    all.forEach(function(el){ el.classList.add('is-visible'); });
    return;
  }

  var revealObs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('is-visible');
        revealObs.unobserve(e.target);
      }
    });
  },{threshold:0.1, rootMargin:'0px 0px -36px 0px'});

  all.forEach(function(el){ revealObs.observe(el); });

  /* ── COUNTER ANIMATION ── */
  function runCounter(el){
    var raw = el.textContent.trim();
    var num = parseFloat(raw.replace(/[^0-9.]/g,''));
    var suffix = raw.replace(/[0-9.]/g,'');
    if(isNaN(num)||num===0) return;
    var start = null, dur = 1600;
    var from = num > 200 ? num - 300 : num > 10 ? Math.max(0, num - (num*0.6|0)) : 0;
    function step(ts){
      if(!start) start = ts;
      var p = Math.min((ts-start)/dur,1);
      var e = 1-Math.pow(1-p,3);
      var cur = from + (num-from)*e;
      el.textContent = (num%1===0 ? Math.round(cur) : cur.toFixed(1)) + suffix;
      if(p<1) requestAnimationFrame(step);
      else el.textContent = raw;
    }
    requestAnimationFrame(step);
  }

  var ctrObs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ runCounter(e.target); ctrObs.unobserve(e.target); }
    });
  },{threshold:0.6});

  document.querySelectorAll('.tb-num,.pillar-stat-num,.stat__num,.mock-day').forEach(function(el){
    ctrObs.observe(el);
  });

})();
</script>
