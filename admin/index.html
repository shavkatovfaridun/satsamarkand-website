<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — SAT Samarkand</title><style>
:root{
  --navy:#022049;--navy2:#011535;--navy3:#010e24;
  --blue:#0661de;--blue2:#0450b4;--elec:#2979ff;
  --bpale:#e8f0fe;--bxpale:#f0f4ff;
  --t:#1d1d1f;--t2:#3d3d3d;--tm:#6e6e73;--tl:#86868b;
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8ecf0;
  --bd:#d2d2d7;--bd2:#c0c0c8;
  --ss:0 1px 3px rgba(0,0,0,.06),0 1px 8px rgba(0,0,0,.04);
  --sm:0 2px 12px rgba(0,0,0,.08),0 4px 24px rgba(0,0,0,.05);
  --sl:0 8px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
  --r:12px;--rsm:8px;--rlg:18px;--rxl:24px;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  --ft:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--t);line-height:1.6;min-height:100vh}
a{text-decoration:none;color:inherit}

.admin-nav{background:var(--navy);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--navy3)}
.admin-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.admin-nav-logo img{height:26px;width:26px;object-fit:contain}
.admin-nav-logo span{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.04em}
.admin-nav-links{display:flex;gap:4px}
.admin-nav-links a{color:rgba(255,255,255,.55);font-size:.8rem;padding:6px 12px;border-radius:6px;text-decoration:none;transition:all .15s}
.admin-nav-links a:hover,.admin-nav-links a.on{background:rgba(255,255,255,.1);color:#fff}
.admin-nav-right{display:flex;align-items:center;gap:10px}
.admin-badge{font-size:.65rem;font-weight:700;background:rgba(96,165,250,.2);color:#60a5fa;padding:3px 10px;border-radius:20px;border:1px solid rgba(96,165,250,.3);letter-spacing:.05em}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:.75rem;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}

.admin-wrap{max-width:1100px;margin:0 auto;padding:32px 5vw}
.admin-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rlg);padding:28px;box-shadow:var(--ss);margin-bottom:20px}
.admin-card h2{font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:1.2rem;padding-bottom:.7rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.admin-card h2 svg{width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--navy);margin-bottom:.35rem}
.fg input,.fg select{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:.88rem;font-family:inherit;color:var(--t);background:#fff;transition:border-color .15s,box-shadow .15s;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(6,97,222,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.admin-btn{background:var(--blue);color:#fff;border:none;padding:10px 22px;border-radius:980px;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;text-decoration:none;display:inline-block;text-align:center}
.admin-btn:hover{background:var(--blue2)}
.admin-btn:disabled{opacity:.5;cursor:not-allowed}
.admin-btn.secondary{background:var(--bg2);color:var(--t);border:1px solid var(--bd)}
.admin-btn.secondary:hover{background:var(--bg3)}

.scores-table,.reg-table{width:100%;border-collapse:collapse;font-size:.85rem}
.scores-table th,.reg-table th{padding:10px 14px;text-align:left;font-size:.7rem;font-weight:700;color:var(--tl);letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid var(--bd)}
.scores-table td,.reg-table td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--t2)}
.scores-table tr:hover td,.reg-table tr:hover td{background:var(--bg2)}
.score-highlight{font-family:var(--f);font-weight:700;color:var(--navy);font-size:.95rem}
.rank-cell{font-weight:700;color:var(--blue)}
.reg-table td{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.success-toast{display:none;background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8;padding:10px 16px;border-radius:var(--rsm);font-size:.83rem;margin-bottom:1rem;font-weight:500}
.error-toast{display:none;background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:10px 16px;border-radius:var(--rsm);font-size:.83rem;margin-bottom:1rem}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-mini{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--ss);text-align:center}
.stat-mini-n{font-family:var(--f);font-size:1.8rem;font-weight:700;color:var(--navy);letter-spacing:-.03em;line-height:1}
.stat-mini-l{font-size:.72rem;color:var(--tl);margin-top:3px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy3),var(--navy))}
.login-card{background:#fff;border-radius:var(--rxl);padding:40px;width:100%;max-width:380px;box-shadow:var(--sl);text-align:center;margin:1rem}
.login-logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:1.5rem}
.login-logo img{height:32px;width:32px;object-fit:contain}
.login-title{font-family:var(--f);font-size:1.3rem;font-weight:700;color:var(--navy);margin-bottom:.3rem}
.login-sub{font-size:.82rem;color:var(--tm);margin-bottom:1.8rem}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:1rem}
.login-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(6,97,222,.1)}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:13px;border-radius:980px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--blue2)}
.login-err{font-size:.8rem;color:#dc2626;margin-top:.5rem;display:none}

.loading-row{text-align:center;padding:30px;color:var(--tl);font-size:.85rem}
@media(max-width:640px){.frow{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}.admin-nav-links{display:none}}
</style><link rel="stylesheet" href="/enhancements.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.webp" alt="SAT Samarkand">
      <div style="text-align:left">
        <div style="font-size:.55rem;font-weight:700;letter-spacing:.2em;color:var(--blue);text-transform:uppercase">SAT</div>
        <div style="font-size:.78rem;font-weight:700;letter-spacing:.08em;color:var(--navy);text-transform:uppercase">Samarkand</div>
      </div>
    </div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Enter your password to continue.</div>
    <input type="password" id="pw" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" autofocus>
    <button class="login-btn" onclick="login()">Sign In →</button>
    <p class="login-err" id="loginErr">Incorrect password. Please try again.</p>
  </div>
</div>
<script>
function login() {
  const pw = document.getElementById('pw').value;
  if (pw === 'satsamarkand2026') {
    sessionStorage.setItem('sats_admin', '1');
    window.location.href = '/admin/dashboard.html';
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
if (sessionStorage.getItem('sats_admin') === '1') window.location.href = '/admin/dashboard.html';
</script>
</body></html>
